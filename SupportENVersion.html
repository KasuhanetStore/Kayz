<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support - KasuhaNET</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f1115;
  color:#eaeaea;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:120px auto 50px auto; /* Ditambah margin atas sikit supaya tak lekat top screen */
  padding:30px;
  background:#151923;
  border-radius:12px;
  text-align:center;
}

/* TITLE */
h1{
  color:#00d4ff;
}

/* TEXT */
p{
  color:#bbb;
  font-size:14px;
}

/* FORM */
input, textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#1a1f2e;
  border:none;
  border-radius:6px;
  color:white;
  box-sizing: border-box; /* Mengelakkan input terkeluar dari container */
}

/* BUTTON */
button{
  background:#00d4ff;
  border:none;
  padding:10px 20px;
  border-radius:6px;
  cursor:pointer;
  font-weight: bold;
}

button:hover {
  background: #00b4d8;
}
</style>
</head>

<body>

<div class="container">

  <h1>Support Centre</h1>

  <p>Need help? Contact us below.</p>

  <form>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="4" placeholder="Describe your issue..."></textarea>
    <button type="submit">Submit</button>
  </form>

  <p style="margin-top: 20px;">
    <a href="index.html" style="color:#00d4ff; text-decoration: none;">
      ← Back To Home
    </a>
  </p>

</div>

</body>
</html>
