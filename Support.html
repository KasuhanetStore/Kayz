<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support - KasuhaNET</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f1115;
  color:#eaeaea;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:50px auto;
  padding:30px;
  background:#151923;
  border-radius:12px;
  text-align:center;
}

/* TITLE */
h1{
  color:#00d4ff;
}

/* TEXT */
p{
  color:#bbb;
  font-size:14px;
}

/* FORM */
input, textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#1a1f2e;
  border:none;
  border-radius:6px;
  color:white;
}

/* BUTTON */
button{
  background:#00d4ff;
  border:none;
  padding:10px 20px;
  border-radius:6px;
  cursor:pointer;
}

/* LANG SWITCH */
.lang{
  position:absolute;
  top:20px;
  right:20px;
}

.lang button{
  background:#1a1f2e;
  border:1px solid #00d4ff;
  color:white;
  padding:5px 10px;
  margin-left:5px;
  border-radius:6px;
  cursor:pointer;
}

.active{
  background:#00d4ff;
  color:black;
}
</style>
</head>

<body>

<div class="lang">
  <button onclick="setLang('en')" id="btn-en">EN</button>
  <button onclick="setLang('ms')" id="btn-ms">BM</button>
</div>

<div class="container">

<h1 data-en="Support Centre"
    data-ms="Pusat Bantuan">
    Support Centre
</h1>

<p data-en="Need help? Contact us below."
   data-ms="Perlukan bantuan? Hubungi kami di bawah.">
   Need help? Contact us below.
</p>

<input type="text"
       placeholder="Your Name"
       data-en-placeholder="Your Name"
       data-ms-placeholder="Nama Anda">

<input type="email"
       placeholder="Your Email"
       data-en-placeholder="Your Email"
       data-ms-placeholder="Emel Anda">

<textarea rows="4"
          placeholder="Describe your issue..."
          data-en-placeholder="Describe your issue..."
          data-ms-placeholder="Terangkan masalah anda..."></textarea>

<button data-en="Submit"
        data-ms="Hantar">
        Submit
</button>

<p>
  <a href="index.html" style="color:#00d4ff;">
    ← Back To Home
  </a>
</p>

</div>

<script>
function setLang(lang){
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.innerText = el.getAttribute('data-' + lang);
  });

  document.querySelectorAll('[data-en-placeholder]').forEach(el=>{
    el.placeholder = el.getAttribute('data-' + lang + '-placeholder');
  });

  localStorage.setItem('lang', lang);

  document.getElementById('btn-en').classList.remove('active');
  document.getElementById('btn-ms').classList.remove('active');
  document.getElementById('btn-' + lang).classList.add('active');
}

window.onload = function(){
  setLang(localStorage.getItem('lang') || 'en');
}
</script>

</body>
</html>
